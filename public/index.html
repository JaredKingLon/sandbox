<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1> Clanker Clash! </h1>

  <section>
    <div class="image-row">
      <img src="https://raw.githubusercontent.com/JaredKingLon/NEA/main/yellow%20robot%20index%20square.png" alt="Yellow robot">
      <img src="https://raw.githubusercontent.com/JaredKingLon/NEA/main/whiterobotindexpage2.png" alt="White robot">
      <img src="https://raw.githubusercontent.com/JaredKingLon/NEA/main/black%20and%20green%20robot%20index.png" alt="Robot image">
    </div>


  <h2 style ="color:#F0EDA8">Your Name:</h2>
    <input id="namebox" type="text">

    <h2 style ="color:#F0EDA8">Your Tutor:</h2>
    <input id="tutorbox" type="text">

    <button id="join" style ="background-color:#F5E590; color:#afcee2;">JOIN</button>
    <p id = "messageBox">               </p>
  </section>
  <section>
  <button id="check-scores" onclick="window.location.href='scoreDisplay.html'" style="background-color:#F5E590; color:yellow;">CHECK SCORES</button>
  <button onclick="window.location.href='maingamephaser.html'" > QUICKPLAY</button>
 </section>

    <script type="module">
      /* Doing The Supabase Stuff */
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
    const supabaseUrl = 'https://nelcsssoxnlbfrjqvvnp.supabase.co';
    const supabaseKey = 'sb_publishable_rFSukQnhifkKajWx8iHFdg_fj3cAC8C';
    const supabase = createClient(supabaseUrl, supabaseKey);

    const name = document.getElementById('namebox'); /*grabbing stuff from the html */
    const tutor = document.getElementById('tutorbox');
    const joinButton = document.getElementById('join');
     /* Finishing The Supabase constants */

    /* The appendchild basically makes it so that the message showing is made as a 'child'
      basically it is added below the message box, and the newest child is added below the previous one,
       so it creates a list of messages that are shown to the user */
      function showmessage(message) {
        const messageElement = document.createElement('p'); /*creates a paragraph*/
        messageElement.textContent = message;
        document.getElementById('messageBox').appendChild(messageElement); /* referring to my HTML element below JOIN*/
        setTimeout(() => {            /* This means that it'll remove the message above or the 'first' message after 3 seconds */
          clearMessage();
        }, 3000);
      }

      function clearMessage() { 
        const messageContainer = document.getElementById('messageBox'); /*assigning var to the message*/
        while (messageContainer.firstChild) { /*checks if there is a message, specifically the first message, if there is it removes it, and keeps doing that until there are no more messages */
          messageContainer.removeChild(messageContainer.firstChild);
        }
      }

      function validateInput() { /*validing inputs like if its too long or empty*/
        clearMessage();
        if (name.value.trim() === '') {
          showmessage('Please enter your name.');
          return false;
        }
        if (tutor.value.trim() === '') {
          showmessage('Please enter your tutor\'s name.');
          return false;
        }
        if (!isNaN(name.value) || !isNaN(tutor.value)) { /* if it is not not a number, ie. it is a number, then we show an error message */
          showmessage('Please enter a valid name or tutor.');
          return false;
        }

        if(name.value.length > 12) {
          showmessage('Your name is too long, please enter a name with less than 12 characters.');
          return false;
        }
        if(tutor.value.length>4) {
          showmessage('Your tutor name is too long, please enter a tutor name with less than 4 characters.');
          return false;
        }
        return true;
      }
     
     
     
     
      /* Adding the event listener to the join button so we can see when its clicked*/
    joinButton.addEventListener('click', async () => {
      if (!validateInput()) {
        return; /*if the input is not valid we stop the function here */
      }
      const { data, error } = await supabase
        .from('NamesAndScores')
        .insert([  /*when the button is clicked we insert the name and tutor into the database */
          { Names: name.value, Tutor: tutor.value }
        ]);
      /* if there is an error I can log it for debugging and show a message to the user, if not we log the data and show a success message */
      if (error) {
        showmessage('Your Name is taken, please try again with a different name.');
      } else {
        localStorage.setItem('playerName', name.value.trim());
        showmessage('You have joined !');
        setTimeout(() => {
          window.location.href = `maingamephaser.html?playerName=${encodeURIComponent(name.value.trim())}`;
        }, 1000);
      }
    });
    </script>
  </main>
</body>
</html>
